name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop-shell/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build real frontend source
        run: npm run build:frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop-shell

      - name: Check desktop syntax
        run: |
          node --check desktop-shell/main.js
          node --check desktop-shell/preload.cjs
          node --check desktop-shell/updater.js
          node --check desktop-shell/printer/printExecutor.js
          node --check desktop-shell/printer/windowsPrinter.js
          node --check desktop-shell/scripts/sync-frontend-dist.cjs
          node --check desktop-shell/scripts/verify-package-files.cjs
          node --check desktop-shell/scripts/run-electron-builder.cjs

      - name: Verify frontend bundle exists
        run: |
          test -f frontend-dist/index.html
          test -d frontend-dist/assets

      - name: Build Linux AppImage and DEB
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux --prefix desktop-shell

      - name: Verify package contents
        run: npm run verify:package --prefix desktop-shell

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: printease-desktop-linux
          if-no-files-found: error
          path: |
            desktop-shell/release/*.AppImage
            desktop-shell/release/*.AppImage.blockmap
            desktop-shell/release/*.deb
            desktop-shell/release/latest-linux.yml

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-shell/release/*.AppImage
            desktop-shell/release/*.AppImage.blockmap
            desktop-shell/release/*.deb
            desktop-shell/release/latest-linux.yml

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop-shell/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop-shell

      - name: Build real frontend source
        run: npm run build:frontend

      - name: Check desktop syntax
        run: |
          node --check desktop-shell/main.js
          node --check desktop-shell/preload.cjs
          node --check desktop-shell/updater.js
          node --check desktop-shell/printer/printExecutor.js
          node --check desktop-shell/printer/windowsPrinter.js
          node --check desktop-shell/scripts/run-electron-builder.cjs

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win --prefix desktop-shell

      - name: Verify package contents
        run: npm run verify:package --prefix desktop-shell

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: printease-desktop-windows
          if-no-files-found: error
          path: |
            desktop-shell/release/*.exe
            desktop-shell/release/*.exe.blockmap
            desktop-shell/release/latest.yml

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-shell/release/*.exe
            desktop-shell/release/*.exe.blockmap
            desktop-shell/release/latest.yml
