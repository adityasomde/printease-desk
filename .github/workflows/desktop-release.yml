name: Desktop Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, example: 0.1.36"
        required: true
        type: string

  push:
    tags:
      - "v*"
      - "desktop-v*"

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            desktop-shell/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop-shell dependencies
        run: npm ci --prefix desktop-shell

      - name: Build frontend and sync frontend-dist
        run: npm run build:frontend

      - name: Build Linux release
        run: npm run dist:linux --prefix desktop-shell

      - name: Verify Linux package
        run: npm run verify:package --prefix desktop-shell
        env:
          PE_TARGET_PLATFORM: linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            desktop-shell/release/*.AppImage
            desktop-shell/release/*.deb
            desktop-shell/release/latest-linux.yml
          if-no-files-found: error

  windows:
    name: Build Windows
    runs-on: windows-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            desktop-shell/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop-shell dependencies
        run: npm ci --prefix desktop-shell

      - name: Build frontend and sync frontend-dist
        run: npm run build:frontend

      - name: Build Windows release
        run: npm run dist:win --prefix desktop-shell

      - name: Verify Windows package
        run: npm run verify:package --prefix desktop-shell
        env:
          PE_TARGET_PLATFORM: win32

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            desktop-shell/release/*.exe
            desktop-shell/release/latest.yml
          if-no-files-found: error

  draft-release:
    name: Create Draft GitHub Release
    needs:
      - linux
      - windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets

      - name: Show release assets
        run: find release-assets -maxdepth 2 -type f -print

      - name: Decide tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PrintEase Desktop ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: false
          files: |
            release-assets/*
          body: |
            PrintEase Desktop ${{ steps.tag.outputs.tag }}

            Automated draft release build.

            Included:
            - Linux AppImage
            - Linux deb
            - latest-linux.yml
            - Windows installer exe
            - latest.yml

            Verification completed by CI:
            - Linux package build passed
            - Linux package verification passed
            - Windows package build passed
            - Windows package verification passed

            Manual checks still required before publishing:
            - Download Linux build and open app
            - Download Windows build and open app
            - Confirm no blank screen
            - Confirm dashboard loads
            - Confirm printer page opens
            - Confirm no did-fail-load/render-process-gone errors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
