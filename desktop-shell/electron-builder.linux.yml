appId: com.printease.desktop
productName: PrintEase Desktop
directories:
  output: release
files:
  - main.js
  - preload.cjs
  - package.json
  - src/**/*
  - updater.js
  - scripts/**/*
  - assets/**/*
  - "!printer/windows/**/*"
  - "!**/*.md"
  - "!**/docs/**/*"
  - "!**/tests/**/*"
  - "!**/.git/**/*"
  - "!**/frontend/src/**/*"
  - "!tools/release-gui/**/*"
  - "!release-checks/**/*"
  - "!docs/**/*"
  - "!.github/**/*"
  - "!backend/**/*"
  - "!**/.env"
  - "!**/*.pem"
  - "!**/*.pfx"
  - "!**/*.p12"
extraResources:
  - from: "../frontend-dist"
    to: "frontend-dist"
    filter:
      - "**/*"
      - "!**/*.md"
  - from: "vendor/libreoffice/linux"
    to: "vendor/libreoffice/linux"
    filter:
      - "**/*"
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  artifactName: "PrintEase-Desktop-${version}-${arch}.${ext}"
  maintainer: "PrintEase <support@printease.local>"
appImage:
  artifactName: "PrintEase-Desktop-${version}-${arch}.${ext}"
deb:
  artifactName: "PrintEase-Desktop-${version}-${arch}.${ext}"
publish:
  - provider: github
    owner: adityasomde
    repo: printease-desk
