appId: com.printease.desktop
productName: PrintEase Desktop
directories:
  output: release
files:
  - main.js
  - preload.cjs
  - package.json
  - agent/**/*
  - config/**/*
  - ipc/**/*
  - printer/**/*
  - local/**/*
  - updater.js
  - scripts/**/*
  - "!printer/windows/**/*"
  - "!**/*.md"
  - "!**/docs/**/*"
  - "!**/tests/**/*"
  - "!**/.git/**/*"
  - "!**/frontend/src/**/*"
extraResources:
  - from: "../frontend-dist"
    to: "frontend-dist"
    filter:
      - "**/*"
      - "!**/*.md"
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  artifactName: "PrintEase-Desktop-${version}-${arch}.${ext}"
  maintainer: "PrintEase <support@printease.local>"
appImage:
  artifactName: "PrintEase-Desktop-${version}-${arch}.${ext}"
deb:
  artifactName: "PrintEase-Desktop-${version}-${arch}.${ext}"
publish:
  - provider: github
    owner: adityasomde
    repo: printease-desk
