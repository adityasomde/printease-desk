appId: com.printease.desktop
productName: PrintEase Desktop
directories:
  output: release
files:
  - main.js
  - preload.cjs
  - package.json
  - agent/**/*
  - config/**/*
  - security/**/*
  - ipc/**/*
  - printer/**/*
  - local/**/*
  - updater.js
  - scripts/**/*
  - assets/**/*
  - "!printer/linux/**/*"
  - "!**/*.md"
  - "!**/docs/**/*"
  - "!**/tests/**/*"
  - "!**/.git/**/*"
  - "!**/frontend/src/**/*"
  - "!tools/release-gui/**/*"
  - "!release-checks/**/*"
  - "!docs/**/*"
  - "!.github/**/*"
  - "!backend/**/*"
  - "!**/.env"
  - "!**/*.pem"
  - "!**/*.pfx"
  - "!**/*.p12"
extraResources:
  - from: "../frontend-dist"
    to: "frontend-dist"
    filter:
      - "**/*"
      - "!**/*.md"
  - from: "vendor/win/SumatraPDF.exe"
    to: "vendor/win/SumatraPDF.exe"
  - from: "vendor/win/THIRD_PARTY_NOTICES.md"
    to: "vendor/win/THIRD_PARTY_NOTICES.md"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: "build/icon.png"
  artifactName: "PrintEase-Desktop-Setup-${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "PrintEase Desktop"
  deleteAppDataOnUninstall: false
publish:
  - provider: github
    owner: adityasomde
    repo: printease-desk
